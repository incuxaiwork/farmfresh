name: ecommerce_app
description: A professional Flutter E-Commerce mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  supabase_flutter: ^2.3.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  google_fonts: any
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.4
  postgres: ^3.0.0
  http: ^1.2.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.2
  socket_io_client: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
