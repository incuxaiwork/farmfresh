name: ecommerce_app
description: A professional Flutter E-Commerce mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  google_fonts: 8.1.0
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  http: ^1.2.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.2
  socket_io_client: ^2.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.3

dependency_overrides:
  geolocator_android: 4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true