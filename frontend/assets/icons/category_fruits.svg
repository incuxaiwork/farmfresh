<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="appleBody" x1="16" y1="18" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4D4D"/>
      <stop offset="60%" stop-color="#E60000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="32" y1="8" x2="44" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="gloss" cx="26" cy="24" r="10" fx="24" fy="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="fruitShadow" x="10" y="14" width="44" height="46" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="5" stdDeviation="3.5" flood-color="#800000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#fruitShadow)">
    <!-- 3D Apple Main Body -->
    <path d="M32 20C26 13 14 16 14 30C14 45 26 52 32 52C38 52 50 45 50 30C50 16 38 13 32 20Z" fill="url(#appleBody)"/>
  </g>

  <!-- 3D Stem -->
  <path d="M32 20C32 13 37 9 39 8" stroke="#4E2A1E" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 3D Leaf with shadow & highlight -->
  <path d="M34 14C40 10 46 14 45 18C40 22 34 18 34 14Z" fill="url(#leafGrad)"/>
  <path d="M35 15C39 13 43 15 43 15" stroke="#A5D6A7" stroke-width="1" stroke-linecap="round"/>

  <!-- Glossy 3D Highlight Curve -->
  <ellipse cx="24" cy="26" rx="5" ry="9" fill="url(#gloss)" transform="rotate(-28 24 26)"/>
  <circle cx="21" cy="36" r="2.5" fill="#FFFFFF" opacity="0.4"/>
</svg>
