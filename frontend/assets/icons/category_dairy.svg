<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cheeseTop" x1="12" y1="20" x2="52" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="cheeseFront" x1="12" y1="36" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="cheeseShadow" x="8" y="14" width="48" height="38" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#E65100" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#cheeseShadow)">
    <!-- 3D Cheese Front Side -->
    <path d="M12 44L48 44L52 24L12 44Z" fill="url(#cheeseFront)"/>
    <!-- 3D Cheese Top Side -->
    <path d="M12 44L52 24C44 18 28 16 12 24V44Z" fill="url(#cheeseTop)"/>
  </g>

  <!-- 3D Cheese Holes with Depth Shadows -->
  <ellipse cx="24" cy="33" rx="3.5" ry="3" fill="#E65100"/>
  <ellipse cx="24" cy="32.5" rx="3" ry="2.5" fill="#BF360C"/>

  <ellipse cx="36" cy="27" rx="3" ry="2.5" fill="#E65100"/>
  <ellipse cx="36" cy="26.5" rx="2.5" ry="2" fill="#BF360C"/>

  <ellipse cx="32" cy="37" rx="2.5" ry="2" fill="#E65100"/>
  <ellipse cx="32" cy="36.5" rx="2" ry="1.5" fill="#BF360C"/>

  <!-- Glossy Highlight -->
  <path d="M15 26L42 20" stroke="#FFF9C4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
