<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="meatGrad" x1="18" y1="16" x2="48" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="60%" stop-color="#8E0000"/>
      <stop offset="100%" stop-color="#4A0000"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="10" y1="42" x2="22" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <filter id="meatShadow" x="8" y="10" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#3E2723" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#meatShadow)">
    <!-- 3D Meat Body -->
    <path d="M46 16C37 10 23 16 21 27C19 36 26 42 35 40C45 38 52 25 46 16Z" fill="url(#meatGrad)"/>
  </g>

  <!-- 3D Bone Shaft -->
  <path d="M26 34L14 46" stroke="url(#boneGrad)" stroke-width="7.5" stroke-linecap="round"/>
  <!-- 3D Bone Knuckles -->
  <circle cx="12" cy="44" r="5" fill="#F5F5F5"/>
  <circle cx="16" cy="50" r="5" fill="#E0E0E0"/>

  <!-- 3D Meat Marbling Lines / Fat Trims -->
  <path d="M30 22C36 20 42 24 40 28" stroke="#FFCDD2" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <path d="M26 28C32 27 36 31 34 35" stroke="#FFCDD2" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <circle cx="40" cy="20" r="2.5" fill="#FFFFFF" opacity="0.4"/>
</svg>
